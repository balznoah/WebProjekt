apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkin-service
  namespace: smart-ticketing
  labels:
    app: checkin-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkin-service
  template:
    metadata:
      labels:
        app: checkin-service
    spec:
      initContainers:
        - name: wait-for-order-service
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z order-service 3003; do
                echo "Warte auf Order Service..."
                sleep 2
              done
      containers:
        - name: checkin-service
          image: smart-ticketing/checkin-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-ticketing-secret
                  key: JWT_SECRET
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: KAFKA_BROKER
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: ORDER_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: NOTIFICATION_SERVICE_URL
            - name: SERVICE_NAME
              value: "checkin-service"
          readinessProbe:
            httpGet:
              path: /checkin/health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /checkin/health
              port: 3004
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: checkin-service
  namespace: smart-ticketing
spec:
  selector:
    app: checkin-service
  ports:
    - port: 3004
      targetPort: 3004
