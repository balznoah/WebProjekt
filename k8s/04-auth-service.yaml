apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smart-ticketing
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: smart-ticketing/auth-service:latest
          # Never: k8s soll nie versuchen das Image aus einer Registry zu laden
          # Das lokal gebaute Image wird direkt verwendet
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-ticketing-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smart-ticketing
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
