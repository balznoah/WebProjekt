apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smart-ticketing
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-auth
          image: busybox:1.35
          command: ["sh", "-c", "until nc -z auth-service 3001; do sleep 2; done"]
        - name: wait-for-events
          image: busybox:1.35
          command: ["sh", "-c", "until nc -z event-service 3002; do sleep 2; done"]
        - name: wait-for-orders
          image: busybox:1.35
          command: ["sh", "-c", "until nc -z order-service 3003; do sleep 2; done"]
        - name: wait-for-checkin
          image: busybox:1.35
          command: ["sh", "-c", "until nc -z checkin-service 3004; do sleep 2; done"]
      containers:
        - name: api-gateway
          image: smart-ticketing/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-ticketing-secret
                  key: JWT_SECRET
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: AUTH_SERVICE_URL
            - name: EVENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: EVENT_SERVICE_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: ORDER_SERVICE_URL
            - name: CHECKIN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: CHECKIN_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-ticketing-config
                  key: NOTIFICATION_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
# NodePort: API Gateway ist unter localhost:30000 erreichbar
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: smart-ticketing
spec:
  selector:
    app: api-gateway
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
